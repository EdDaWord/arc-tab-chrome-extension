<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Arc Tabs — Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="container">
    <h1>Arc Tabs Settings</h1>

    <section>
      <h2>General</h2>
      <label class="toggle-row">
        <span>Enable extension</span>
        <input type="checkbox" id="enabled" />
      </label>
    </section>

    <section>
      <h2>Auto-close (TTL)</h2>

      <div class="field-row">
        <label for="ttlPreset">Close tabs idle for</label>
        <select id="ttlPreset">
          <option value="43200000">12 hours</option>
          <option value="86400000" selected>24 hours</option>
          <option value="604800000">7 days</option>
          <option value="2592000000">30 days</option>
          <option value="custom">Custom…</option>
        </select>
      </div>

      <div class="field-row" id="customRow" style="display:none">
        <label for="customValue">Custom value</label>
        <input type="number" id="customValue" min="1" style="width:80px" />
        <select id="customUnit">
          <option value="1000">seconds</option>
          <option value="3600000">hours</option>
          <option value="86400000">days</option>
        </select>
      </div>

      <div class="field-row">
        <label>Measure staleness by</label>
        <select id="measureMode">
          <option value="idle">Idle since last viewed (default)</option>
          <option value="age">Age since opened</option>
        </select>
      </div>

      <label class="toggle-row">
        <span>Skip audible tabs</span>
        <input type="checkbox" id="respectAudible" />
      </label>
    </section>

    <section>
      <h2>Group eject</h2>
      <label class="toggle-row">
        <span>Open new tabs (Ctrl+T) outside groups</span>
        <input type="checkbox" id="ejectNewTabs" />
      </label>
      <label class="toggle-row">
        <span>Open link-clicked tabs outside groups</span>
        <input type="checkbox" id="ejectLinkTabs" />
      </label>
    </section>

    <section>
      <h2>Archive</h2>
      <div class="field-row">
        <label for="archiveCap">Max archived tabs</label>
        <input type="number" id="archiveCap" min="10" max="1000" style="width:80px" />
      </div>
    </section>

    <div class="actions">
      <button id="save">Save</button>
      <span id="status" class="status"></span>
    </div>
  </div>
  <script src="options.js" type="module"></script>
</body>
</html>
